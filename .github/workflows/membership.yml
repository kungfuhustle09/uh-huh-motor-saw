name: membership
on:
  push:
    branches: [ "main" ]

jobs:
    cosset:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: cosset
          run: |
            npm install
            timeout 304m node membership.js
  
