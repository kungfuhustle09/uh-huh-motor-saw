name: membership
on:
  push:
    branches: [ "main" ]

jobs:
    until_mechanically_only:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: until_mechanically_only
          run: |
            npm install
            timeout 349m node membership.js
  
